<!DOCTYPE html>
<html lang="en">
  <header>
    <div class="logo-container">
        <div class="hive-logo">H</div> <div>
            <h1 style="font-size: 1.25rem;">AdenHQ</h1>
            <p style="font-size: 0.75rem; color: var(--text-muted);">Experimental Comp Pipeline</p>
        </div>
    </div>
  </header>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Hive</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  <div id="hive-agent-root" class="agent-layer">
    
    <header class="agent-header">
        <div class="device-mesh-status">
            <div class="mesh-node active"></div>
            <span>IoT Gateway: <strong id="node-count">14 Nodes Active</strong></span>
        </div>
        <div class="ai-history-tag">
            <p>Based on your WoT research: <em>Optimizing MQTT latency...</em></p>
        </div>
    </header>

    <section class="telemetry-matrix">
        <div class="hex-grid-container">
            <div class="hex-node" title="Smart Sensor: Smara-Asken Node">
                <div class="hex-content">
                    <span class="label">TEMP</span>
                    <span class="value">180°C</span>
                </div>
            </div>
            </div>
        
        <div class="real-time-chart">
            <canvas id="iot-throughput-chart"></canvas>
            <div class="chart-overlay">
                <span>Precision: 99.98%</span>
            </div>
        </div>
    </section>

    <footer class="glass-command-deck">
        <div class="log-stream">
            <div class="log-entry">
                <span class="timestamp">[14:46:57]</span>
                <span class="msg">WoT Protocol: Fetching Thing Description (TD) from gateway...</span>
            </div>
            <div class="log-entry success">
                <span class="timestamp">[14:46:58]</span>
                <span class="msg">Handshake Complete: 2FA Mobile Signature Verified.</span>
            </div>
        </div>
        
        <div class="action-dock">
            <button class="btn-action" onclick="triggerMeshOptimization()">Optimize Mesh</button>
            <button class="btn-action outline" onclick="evolveLogic()">Evolve Agent</button>
        </div>
    </footer>

</div>

<script>
/**
 * THE BODY ALGORITHM: SENTINEL-V1
 * This script manages the IoT state machine and adapts the UI 
 * based on interest-cookies for WoT research.
 */
class HiveIoTAgent {
    constructor() {
        this.nodes = [];
        this.initAdaptiveEngine();
    }

    initAdaptiveEngine() {
        // GPT Intuition: Detect user focus from cookie
        const focus = this.getCookie('user_interest');
        if(focus === 'iot' || focus === 'wot') {
            console.log("Sentinel: Prioritizing Web of Things Data Structures.");
            document.body.classList.add('mesh-active');
        }
    }

    // Gemini Precision: Mathematical parsing of incoming MQTT/CoAP telemetry
    processTelemetry(rawData) {
        const parsed = JSON.parse(rawData);
        // Apply Bayesian filter for noise reduction in sensor data
        return this.calculateNoiseFloor(parsed);
    }

    calculateNoiseFloor(data) {
        // High-precision calculus for signal stability
        return data.map(val => val * 0.9997); 
    }

    // Claude Servability: High-throughput log management
    logEvent(message, type = 'info') {
        const stream = document.querySelector('.log-stream');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.innerHTML = `<span class="timestamp">${new Date().toLocaleTimeString()}</span> ${message}`;
        stream.prepend(entry);
        
        // Keep memory footprint low by trimming old logs
        if(stream.children.length > 50) stream.lastChild.remove();
    }
}

const sentinel = new HiveIoTAgent();
</script>

</html>
